<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书签管理器 - Bookmark API</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 0;
        }

        .container {
            padding: 0 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
        }

        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }

        .page-header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .api-card {
            margin: 20px auto;
            padding: 0;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            border: none;
            overflow: hidden;
            background: white;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .api-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .api-card-header {
            padding: 20px 25px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .api-card-header .method-badge {
            font-size: 0.85rem;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .api-card-header h5 {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 600;
        }

        .api-card-header.get { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .api-card-header.post { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .api-card-header.put { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .api-card-header.delete { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }

        .api-card-body {
            padding: 25px;
        }

        .result-box {
            min-height: 120px;
            max-height: 250px;
            white-space: pre-wrap;
            word-break: break-all;
            overflow-y: auto;
            resize: vertical;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 15px;
            background: #f8fafc;
            transition: border-color 0.3s ease;
        }

        .result-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .input-group, .row.g-3 {
            margin-bottom: 18px;
        }

        .form-control {
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .btn-info {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: white;
        }

        .input-group .btn {
            margin-bottom: 0;
        }

        .api-section {
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-bookmark me-3"></i>书签管理器</h1>
            <p>Bookmark API 测试工具</p>
            <div class="mt-4 p-4 rounded-3" style="background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);">
                <div class="input-group">
                    <span class="input-group-text bg-white text-dark"><i class="fas fa-key"></i> JWT Token</span>
                    <input type="text" class="form-control" id="inputToken" placeholder="请先登录获取Token，或手动输入 Bearer xxx">
                    <button class="btn btn-warning" onclick="setToken()">设置Token</button>
                </div>
                <small class="text-white-50 mt-2 d-block">💡 提示：查询所有书签需要登录认证，请先获取 Token</small>
            </div>
        </div>

        <!-- 1. GET /api/Bookmark（查询所有书签） -->
        <div class="api-section">
            <div class="card api-card">
                <div class="api-card-header get">
                    <span class="method-badge bg-white text-success">GET</span>
                    <h5>查询所有书签</h5>
                </div>
                <div class="api-card-body">
                    <button class="btn btn-success" onclick="getAllBookmarks()">
                        <i class="fas fa-list"></i> 获取所有书签
                    </button>
                    <div class="mt-3">
                        <textarea class="form-control result-box" id="result-getAll" readonly></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. GET /api/Bookmark/{id}（查询单个书签） -->
        <div class="api-section">
            <div class="card api-card">
                <div class="api-card-header get">
                    <span class="method-badge bg-white text-success">GET</span>
                    <h5>查询单个书签</h5>
                </div>
                <div class="api-card-body">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="input-getId" placeholder="输入书签ID" value="36215f73-e3bd-494e-af27-300f2bee5139">
                        <button class="btn btn-success" onclick="getBookmarkById()">
                            <i class="fas fa-search"></i> 查询
                        </button>
                    </div>
                    <div class="mt-3">
                        <textarea class="form-control result-box" id="result-getId" readonly></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3. POST /api/Bookmark（新增书签） -->
        <div class="api-section">
            <div class="card api-card">
                <div class="api-card-header post">
                    <span class="method-badge bg-white text-primary">POST</span>
                    <h5>新增书签</h5>
                </div>
                <div class="api-card-body">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="input-post-address" placeholder="书签地址" value="https://www.test.com">
                                <label for="input-post-address"><i class="fas fa-link me-2"></i>书签地址</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="input-post-title" placeholder="书签名称" value="测试网站">
                                <label for="input-post-title"><i class="fas fa-heading me-2"></i>书签名称</label>
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="createBookmark()">
                        <i class="fas fa-plus"></i> 创建书签
                    </button>
                    <div class="mt-3">
                        <textarea class="form-control result-box" id="result-post" readonly></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- 4. PUT /api/Bookmark/{id}（更新书签） -->
        <div class="api-section">
            <div class="card api-card">
                <div class="api-card-header put">
                    <span class="method-badge bg-white text-warning">PUT</span>
                    <h5>更新书签</h5>
                </div>
                <div class="api-card-body">
                    <div class="row g-3 mb-3">
                        <div class="col-md-12">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="input-put-id" placeholder="书签ID" value="36215f73-e3bd-494e-af27-300f2bee5139">
                                <label for="input-put-id"><i class="fas fa-key me-2"></i>书签ID</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="input-put-address" placeholder="新地址" value="https://www.baidu.com">
                                <label for="input-put-address"><i class="fas fa-link me-2"></i>新地址</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="input-put-title" placeholder="新名称" value="百度">
                                <label for="input-put-title"><i class="fas fa-heading me-2"></i>新名称</label>
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-warning" onclick="updateBookmark()">
                        <i class="fas fa-edit"></i> 更新书签
                    </button>
                    <div class="mt-3">
                        <textarea class="form-control result-box" id="result-put" readonly></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- 5. DELETE /api/Bookmark/{id}（删除书签） -->
        <div class="api-section">
            <div class="card api-card">
                <div class="api-card-header delete">
                    <span class="method-badge bg-white text-danger">DELETE</span>
                    <h5>删除书签</h5>
                </div>
                <div class="api-card-body">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="input-delete-id" placeholder="输入要删除的书签ID" value="36215f73-e3bd-494e-af27-300f2bee5139">
                        <button class="btn btn-danger" onclick="deleteBookmark()">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    </div>
                    <div class="mt-3">
                        <textarea class="form-control result-box" id="result-delete" readonly></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const baseUrl = "http://localhost:5248/api/Bookmark";
        let authToken = localStorage.getItem('jwt_token') || '';

        function setToken() {
            const token = document.getElementById('inputToken').value.trim();
            if (token) {
                authToken = token;
                localStorage.setItem('jwt_token', token);
                document.getElementById('inputToken').value = token;
                alert('✅ Token 已设置！现在可以查询书签了');
            } else {
                alert('❌ 请输入有效的 Token');
            }
        }

        function getHeaders() {
            const headers = { 'Content-Type': 'application/json' };
            if (authToken) {
                headers['Authorization'] = authToken;
            }
            return headers;
        }

        // 1. 查询所有（需要认证）
        async function getAllBookmarks() {
            try {
                if (!authToken) {
                    document.getElementById("result-getAll").value = "⚠️ 错误：请先设置 JWT Token\n\n查询所有书签接口需要登录认证，请：\n1. 先调用登录接口获取 Token\n2. 或手动输入 Token 到上方输入框";
                    return;
                }
                const res = await fetch(baseUrl, { headers: getHeaders() });
                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(`HTTP ${res.status}: ${errText}`);
                }
                const data = await res.json();
                document.getElementById("result-getAll").value = JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById("result-getAll").value = "请求失败：" + err.message;
            }
        }

        // 2. 查询单个
        async function getBookmarkById() {
            const id = document.getElementById("input-getId").value;
            try {
                const res = await fetch(`${baseUrl}/${id}`);
                const data = await res.json();
                document.getElementById("result-getId").value = JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById("result-getId").value = "请求失败：" + err.message;
            }
        }

        // 3. 新增
        async function createBookmark() {
            const address = document.getElementById("input-post-address").value;
            const title = document.getElementById("input-post-title").value;
            const bookmark = {
                Bookmark_Address: address,
                Bookmark_Title: title,
                Bookmark_CreateTime: new Date().toISOString()
            };
            try {
                const res = await fetch(baseUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(bookmark)
                });
                const data = await res.json();
                document.getElementById("result-post").value = JSON.stringify(data, null, 2);
                getAllBookmarks();
            } catch (err) {
                document.getElementById("result-post").value = "请求失败：" + err.message;
            }
        }

        // 4. 更新
        async function updateBookmark() {
            const id = document.getElementById("input-put-id").value;
            const address = document.getElementById("input-put-address").value;
            const title = document.getElementById("input-put-title").value;
            try {
                const oldRes = await fetch(`${baseUrl}/${id}`);
                if (!oldRes.ok) throw new Error("ID不存在");
                const oldData = await oldRes.json();
                const bookmark = {
                    Bookmark_Id: id,
                    Bookmark_Address: address,
                    Bookmark_Title: title,
                    Bookmark_CreateTime: oldData.Bookmark_CreateTime
                };
                const res = await fetch(`${baseUrl}/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(bookmark)
                });
                const data = await res.json();
                document.getElementById("result-put").value = JSON.stringify(data, null, 2);
                getAllBookmarks();
            } catch (err) {
                document.getElementById("result-put").value = "请求失败：" + err.message;
            }
        }

        // 5. 删除
        async function deleteBookmark() {
            const id = document.getElementById("input-delete-id").value;
            try {
                const res = await fetch(`${baseUrl}/${id}`, { method: "DELETE", headers: getHeaders() });
                document.getElementById("result-delete").value = res.status === 204 ? "删除成功" : "删除失败，状态码：" + res.status;
                getAllBookmarks();
            } catch (err) {
                document.getElementById("result-delete").value = "请求失败：" + err.message;
            }
        }

        // 页面加载时恢复Token
        window.onload = function() {
            if (authToken) {
                document.getElementById('inputToken').value = authToken;
            }
        };
    </script>
</body>
</html>
