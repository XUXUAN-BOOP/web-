<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>🔐 身份验证 + 书签管理 测试中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: none;
        }
        .card-header {
            border-radius: 15px 15px 0 0 !important;
            font-weight: 700;
            color: white;
        }
        .login-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .bookmark-header { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
        }
        .token-display {
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            max-height: 80px;
            overflow-y: auto;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
        }
        .status-online { background: #d1fae5; color: #059669; }
        .status-offline { background: #fee2e2; color: #dc2626; }
        .result-box {
            min-height: 150px;
            max-height: 300px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            resize: vertical;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <!-- 状态栏 -->
        <div class="row mb-3">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center bg-white rounded-3 p-3 shadow-sm">
                    <h4 class="mb-0"><i class="fas fa-flask text-primary me-2"></i>身份验证 + 书签管理 一体化测试工具</h4>
                    <span id="apiStatus" class="status-badge status-offline">
                        <i class="fas fa-circle"></i> 检测中...
                    </span>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- 左侧：登录模块 -->
            <div class="col-md-5">
                <div class="card h-100">
                    <div class="card-header login-header py-3">
                        <i class="fas fa-sign-in-alt me-2"></i>第一步：用户登录获取 Token
                    </div>
                    <div class="card-body">
                        <form id="loginForm" onsubmit="handleLogin(event)">
                            <div class="mb-3">
                                <label class="form-label fw-bold"><i class="fas fa-user me-1"></i>账号</label>
                                <input type="text" class="form-control form-control-lg" id="account" value="user01"
                                    placeholder="输入账号" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold"><i class="fas fa-lock me-1"></i>密码</label>
                                <input type="text" class="form-control form-control-lg" id="password" value="user01"
                                    placeholder="输入密码" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                                <i class="fas fa-sign-in-alt me-2"></i>登录并获取 Token
                            </button>
                        </form>

                        <!-- Token 显示区 -->
                        <div id="tokenSection" class="d-none fade-in">
                            <hr>
                            <label class="form-label fw-bold text-success"><i class="fas fa-key me-1"></i>JWT Token（已自动保存）</label>
                            <div class="alert alert-success mb-2 p-2 token-display" id="tokenDisplay"></div>
                            <small class="text-muted">✅ Token 已自动设置到请求头，可直接测试下方接口</small>
                        </div>

                        <!-- 登录结果 -->
                        <div id="loginResult" class="mt-3 d-none"></div>
                    </div>
                </div>
            </div>

            <!-- 右侧：书签操作 -->
            <div class="col-md-7">
                <div class="card h-100">
                    <div class="card-header bookmark-header py-3">
                        <i class="fas fa-bookmark me-2"></i>第二步：书签 CRUD 操作
                    </div>
                    <div class="card-body">
                        <div class="row g-3 mb-3">
                            <div class="col-md-12">
                                <button class="btn btn-success w-100 py-2" onclick="getAllBookmarks()">
                                    <i class="fas fa-list me-2"></i>GET - 查询所有书签
                                </button>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-8">
                                <input type="text" class="form-control" id="getId" placeholder="输入GUID格式的ID"
                                    value="36215f73-e3bd-494e-af27-300f2bee5139">
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-info w-100" onclick="getBookmarkById()">
                                    <i class="fas fa-search me-1"></i>按ID查询
                                </button>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <input type="text" class="form-control" id="postAddress" placeholder="地址" value="https://www.test.com">
                            </div>
                            <div class="col-md-6">
                                <input type="text" class="form-control" id="postTitle" placeholder="名称" value="测试网站">
                            </div>
                            <div class="col-md-12">
                                <button class="btn btn-primary w-100" onclick="createBookmark()">
                                    <i class="fas fa-plus me-2"></i>POST - 新增书签
                                </button>
                            </div>
                        </div>

                        <!-- 结果显示 -->
                        <div class="mt-3">
                            <label class="form-label fw-bold"><i class="fas fa-code me-1"></i>响应结果</label>
                            <textarea class="form-control result-box" id="resultBox" readonly
                                placeholder="点击上方按钮进行测试..."></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 使用说明 -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h6><i class="fas fa-info-circle text-primary me-2"></i>使用步骤</h6>
                        <ol class="mb-0">
                            <li>在左侧输入<strong>账号和密码</strong>（默认已填入 user01/user01）</li>
                            <li>点击<strong>【登录】</strong>按钮 → 获取 JWT Token</li>
                            <li>Token 自动保存，直接在右侧点击<strong>【查询所有书签】</strong></li>
                            <li>查看返回的 JSON 数据 ✅</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:5248';
        let authToken = localStorage.getItem('jwt_token') || '';

        // 检测API状态
        async function checkApiStatus() {
            const statusEl = document.getElementById('apiStatus');
            try {
                const res = await fetch(`${BASE_URL}/swagger/index.html`, { method: 'HEAD' });
                if (res.ok) {
                    statusEl.className = 'status-badge status-online';
                    statusEl.innerHTML = '<i class="fas fa-circle"></i> API 运行中';
                } else {
                    throw new Error('Not OK');
                }
            } catch (err) {
                statusEl.className = 'status-badge status-offline';
                statusEl.innerHTML = '<i class="fas fa-circle"></i> API 未运行';
            }
        }

        // 恢复Token显示
        function restoreToken() {
            if (authToken) {
                document.getElementById('tokenDisplay').textContent = authToken;
                document.getElementById('tokenSection').classList.remove('d-none');
            }
        }

        // 登录处理
        async function handleLogin(e) {
            e.preventDefault();
            const account = document.getElementById('account').value.trim();
            const password = document.getElementById('password').value.trim();
            const resultDiv = document.getElementById('loginResult');

            if (!account || !password) {
                showLoginError('请输入账号和密码');
                return;
            }

            try {
                resultDiv.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin me-2"></i>正在登录...</div>';
                resultDiv.classList.remove('d-none');

                const res = await fetch(`${BASE_URL}/api/Login/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Account: account, Password: password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data || `HTTP ${res.status}`);
                }

                // 成功
                authToken = data.token;
                localStorage.setItem('jwt_token', authToken);

                document.getElementById('tokenDisplay').textContent = authToken;
                document.getElementById('tokenSection').classList.remove('d-none');

                resultDiv.innerHTML = `
                    <div class="alert alert-success fade-in">
                        <strong><i class="fas fa-check-circle me-2"></i>登录成功！</strong><br>
                        用户：${data.account}<br>
                        角色：${data.role}<br>
                        ID：${data.id}
                    </div>`;
            } catch (err) {
                showLoginError(err.message);
            }
        }

        function showLoginError(msg) {
            document.getElementById('loginResult').innerHTML = `
                <div class="alert alert-danger fade-in">
                    <i class="fas fa-exclamation-triangle me-2"></i>${msg}
                </div>`;
        }

        // 获取请求头
        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                ...(authToken ? { 'Authorization': authToken } : {})
            };
        }

        // 显示结果
        function showResult(data) {
            const el = document.getElementById('resultBox');
            el.value = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
        }

        // GET 所有书签
        async function getAllBookmarks() {
            if (!authToken) {
                showResult('⚠️ 请先登录获取 Token！');
                return;
            }
            try {
                const res = await fetch(`${BASE_URL}/api/Bookmark`, { headers: getHeaders() });
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(`HTTP ${res.status}: ${text}`);
                }
                const data = await res.json();
                showResult(data);
            } catch (err) {
                showResult(`❌ 错误：${err.message}`);
            }
        }

        // GET 单个书签
        async function getBookmarkById() {
            const id = document.getElementById('getId').value.trim();
            try {
                const res = await fetch(`${BASE_URL}/api/Bookmark/${id}`, { headers: getHeaders() });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                showResult(data);
            } catch (err) {
                showResult(`❌ 错误：${err.message}`);
            }
        }

        // POST 新增书签
        async function createBookmark() {
            const address = document.getElementById('postAddress').value.trim();
            const title = document.getElementById('postTitle').value.trim();
            try {
                const res = await fetch(`${BASE_URL}/api/Bookmark`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({
                        Bookmark_Address: address,
                        Bookmark_Title: title,
                        Bookmark_CreateTime: new Date().toISOString()
                    })
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                showResult(data);
                getAllBookmarks();
            } catch (err) {
                showResult(`❌ 错误：${err.message}`);
            }
        }

        // 初始化
        checkApiStatus();
        restoreToken();
        setInterval(checkApiStatus, 5000);
        
        console.log('✅ 测试页面已加载 (Bootstrap版本)');
        console.log('📡 API 地址:', BASE_URL);
        console.log('🔑 Token 状态:', authToken ? '✅ 已设置' : '❌ 未设置');
    </script>
</body>
</html>
